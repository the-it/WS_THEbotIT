[pycodestyle]
max-line-length = 120
exclude =
    archive/*,
    .claude/*,
    venv*/*,
    .venv*/*,
    service/ws_re/register/data/*,
    test_*.py
ignore =
    # E402: module level import not at top of file
    E402,
    # E203/W503/W504: conflict with the ruff formatter (Black-style slicing / line breaks)
    E203,
    W503,
    W504,

[pep8]
max-line-length = 120
exclude =
    archive/*,
    .claude/*,
    venv*/*,
    .venv*/*,
    service/ws_re/register/data/*,
    test_*.py
ignore =
    # E402: module level import not at top of file
    E402,
    # E203/W503/W504: conflict with the ruff formatter (Black-style slicing / line breaks)
    E203,
    W503,
    W504,

[flake8]
max-line-length = 120
statistics = True
count = True
show-source = True
exclude =
    archive/*,
    .claude/*,
    venv*/*,
    .venv*/*,
    service/ws_re/register/data/*,
    test_*.py
ignore =
    # E402: module level import not at top of file
    E402,
    # E203/W503/W504: conflict with the ruff formatter (Black-style slicing / line breaks)
    E203,
    W503,
    W504,
